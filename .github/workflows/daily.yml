name: 매일 공고 수집

on:
  schedule:
    - cron: '0 0 * * *'  # UTC 00:00 = KST 09:00
  workflow_dispatch:       # 수동 실행 버튼도 활성화

jobs:
  run:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # 갱신된 docs/bizinfolist.html 을 같은 브랜치에 푸시
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt
      - run: python main.py
        env:
          BIZINFO_API_KEY: ${{ secrets.BIZINFO_API_KEY }}
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DB_ID: ${{ secrets.NOTION_DB_ID }}
      - name: HTML 변경 시 저장소에 반영
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/bizinfolist.html
          if git diff --staged --quiet; then
            echo "bizinfolist.html 변경 없음"
          else
            git commit -m "chore: refresh docs/bizinfolist.html"
            git push
          fi
